<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menú del Restaurante - QR</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #f59e0b, #f97316);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
    }
    .qr-container {
      background: white;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      max-width: 400px;
    }
    .qr-container h1 {
      color: #0f172a;
      margin-bottom: 10px;
    }
    .qr-container p {
      color: #6b7280;
      margin-bottom: 20px;
    }
    #qrcode {
      margin: 20px auto;
    }
    .btn-volver {
      margin-top: 20px;
      background: #0f172a;
      color: white;
      border: none;
      padding: 10px 30px;
      border-radius: 10px;
      text-decoration: none;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="qr-container">
    <h1>🍽️ Menú del Restaurante</h1>
    <p>Escanea el código QR para ver nuestro menú</p>
    <div id="qrcode"></div>
    <p class="text-muted mt-3" style="font-size:12px;">http://10.155.174.110:3000/menu.html</p>
    <a href="menu.html" class="btn-volver">Ver menú completo</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script>
    const menuURL = 'http://10.155.174.110:3000/menu.html';
    QRCode.toCanvas(document.getElementById('qrcode'), menuURL, {
      width: 256,
      margin: 2,
      color: { dark: '#0f172a', light: '#ffffff' }
    });
  </script>
</body>
</html>
