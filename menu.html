<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de menú</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #f3eee6; font-family: Arial, sans-serif; padding: 20px; }
    .section-header { background: linear-gradient(90deg, #f59e0b, #f97316); color: white; padding: 15px 20px; border-radius: 10px; margin: 20px 0; }
    .section-header h2 { margin: 0; font-size: 1.5rem; }
    .menu-card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin: 10px 0; height: 100%; }
    .menu-card img { width: 100%; height: 200px; object-fit: cover; }
    .menu-body { padding: 15px; }
    .menu-title { font-size: 18px; font-weight: bold; margin: 0 0 10px 0; color: #0f172a; }
    .menu-category { background: #fff3db; color: #b45309; padding: 5px 12px; border-radius: 20px; font-size: 12px; display: inline-block; font-weight: 600; }
    .price-badge { background: #dcfce7; color: #166534; padding: 8px 12px; border-radius: 20px; font-weight: bold; margin: 10px 0; display: inline-block; font-size: 18px; }
    .menu-text { color: #6b7280; margin: 10px 0; font-size: 14px; }
    .carry-box { background: #f8f5ef; padding: 12px; border-radius: 8px; margin-top: 10px; }
    .carry-label { font-weight: bold; color: #92400e; font-size: 12px; margin-bottom: 5px; }
    .carry-text { margin: 0; color: #4b5563; font-size: 14px; }
    .btn-pedir-menu {
      background: linear-gradient(90deg, #f59e0b, #f97316);
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 16px;
      margin-top: 15px;
      cursor: pointer;
      width: 100%;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-pedir-menu:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(249, 115, 22, 0.4);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="mb-4">Gestión de menú</h1>
    
    <section>
      <div class="section-header">
        <h2><i class="bi bi-egg-fried me-2"></i>Entradas</h2>
      </div>
      <div class="row g-4" id="productos-entradas">
        <div class="col-12 text-center text-muted py-4">Cargando productos...</div>
      </div>
    </section>

    <section>
      <div class="section-header">
        <h2><i class="bi bi-fire me-2"></i>Platos fuertes</h2>
      </div>
      <div class="row g-4" id="productos-platos">
        <div class="col-12 text-center text-muted py-4">Cargando productos...</div>
      </div>
    </section>

    <section>
      <div class="section-header">
        <h2><i class="bi bi-cup-straw me-2"></i>Bebidas</h2>
      </div>
      <div class="row g-4" id="productos-bebidas">
        <div class="col-12 text-center text-muted py-4">Cargando productos...</div>
      </div>
    </section>

    <section>
      <div class="section-header">
        <h2><i class="bi bi-cake2 me-2"></i>Postres</h2>
      </div>
      <div class="row g-4" id="productos-postres">
        <div class="col-12 text-center text-muted py-4">Cargando productos...</div>
      </div>
    </section>
  </div>

  <script>
  document.addEventListener('DOMContentLoaded', async () => {
    try {
      const response = await fetch('/api/productos');
      const productos = await response.json();
      
      const contenedores = {
        1: 'productos-entradas',
        2: 'productos-platos',
        3: 'productos-bebidas',
        4: 'productos-postres'
      };
      
      // Limpiar contenedores solo si existen
      Object.values(contenedores).forEach(id => {
        const el = document.getElementById(id);
        if (el) el.innerHTML = '';
      });
      
      if (productos.length === 0) {
        Object.values(contenedores).forEach(id => {
          const el = document.getElementById(id);
          if (el) el.innerHTML = '<div class="col-12 text-center text-muted py-4">No hay productos disponibles</div>';
        });
        return;
      }
      
      const imagenesMap = {
        'pan con ajo': 'img/menu/panconajo.jpg',
        'alitas': 'img/menu/alitas-bbq.jpg',
        'dedos de queso': 'img/menu/dedos-queso.jpg',
        'nachos': 'img/menu/nachos.jpg',
        'pasta alfredo': 'img/menu/pasta-alfredo.jpg',
        'hamburguesa': 'img/menu/hamburguesa.jpg',
        'pizza personal': 'img/menu/pizza-personal.jpg',
        'pollo crispy': 'img/menu/pollo-crispy.jpg',
        'horchata': 'img/menu/horchata.jpg',
        'limonada': 'img/menu/limonada-menta.jpg',
        'soda': 'img/menu/soda.jpg',
        'café': 'img/menu/cafe.jpg',
        'cafe': 'img/menu/cafe.jpg',
        'tres leches': 'img/menu/tres-leches.jpg',
        'brownie': 'img/menu/brownie-con-helado.jpg',
        'cheesecake': 'img/menu/cheesecake.jpg',
        'tiramisú': 'img/menu/tiramisu.jpg',
        'tiramisu': 'img/menu/tiramisu.jpg'
      };
      
      productos.forEach(p => {
        const contenedorId = contenedores[p.categoria_id];
        const contenedor = document.getElementById(contenedorId);
        if (!contenedor) return;
        
        const nombreNormalizado = p.nombre.toLowerCase().trim();
        let imagenSrc = '';
        
        for (const [key, value] of Object.entries(imagenesMap)) {
          if (nombreNormalizado.includes(key)) {
            imagenSrc = value;
            break;
          }
        }
        
        if (!imagenSrc && p.imagen) {
          imagenSrc = p.imagen;
        }
        
        const precio = parseFloat(p.precio).toFixed(2);
        
        const col = document.createElement('div');
        col.className = 'col-12 col-md-6 col-lg-4 col-xl-3';
        col.innerHTML = `
          <div class="menu-card">
            ${imagenSrc ? `
              <img src="${imagenSrc}" alt="${p.nombre}" onerror="this.style.display='none'">
            ` : '<div style="height:200px;background:#f3f3f3;display:flex;align-items:center;justify-content:center;color:#999;">Sin imagen</div>'}
            <div class="menu-body">
              <h4 class="menu-title">${p.nombre}</h4>
              <span class="menu-category">${p.categoria_nombre || 'Producto'}</span>
              <div class="price-badge"><i class="bi bi-cash-stack"></i> $${precio}</div>
              <p class="menu-text">${p.descripcion || ''}</p>
              <div class="carry-box">
                <div class="carry-label">Lleva</div>
                <p class="carry-text">${p.descripcion || 'Consulta en el restaurante'}</p>
              </div>
              <button class="btn-pedir-menu" onclick="pedirProducto('${p.nombre}', ${p.precio})">
                <i class="bi bi-cart-plus"></i> Pedir Ahora
              </button>
            </div>
          </div>
        `;
        contenedor.appendChild(col);
      });
    } catch (error) {
      console.error('Error:', error);
      document.body.innerHTML += '<div style="color:red; padding:20px; background:#fee; border-radius:10px; margin:20px;">Error: ' + error.message + '</div>';
    }
  });

  function pedirProducto(nombre, precio) {
    alert('✅ Producto agregado:\n\n' + nombre + '\nPrecio: $' + precio + '\n\n(Próximamente: carrito de compras)');
  }
  </script>
</body>
</html>
