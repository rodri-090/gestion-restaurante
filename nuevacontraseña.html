<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nueva contraseña</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
  <main class="page">
    <section class="card">
      <div class="brand">
        <p class="subtitle">Nueva contraseña</p>
      </div>

      <form class="form" action="index.html" method="get">
        <label class="field">
          <span class="label">Nueva contraseña</span>
          <div class="input-wrap">
            <i class="bi bi-shield-lock input-icon"></i>
            <input class="input input-pad" type="password" name="pass1" id="pass1"
  minlength="8"
  pattern="^(?=.*[A-Za-z])(?=.*\d).{8,}$"
  title="Debe tener al menos 8 caracteres e incluir letras y números."
  placeholder="••••••••" required>
            <button class="icon-btn" type="button" aria-label="Mostrar contraseña" data-toggle="pass1">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </label>

        <label class="field">
          <span class="label">Confirmar contraseña</span>
          <div class="error" id="errorPass"></div>
          <div class="input-wrap">
            <i class="bi bi-lock input-icon"></i>
            <input
              class="input input-pad"
              type="password"
              name="pass2"
              id="pass2"
              placeholder="••••••••"
              minlength="8"
              pattern="^(?=.*[A-Za-z])(?=.*\d).{8,}$"
              title="Debe tener al menos 8 caracteres e incluir letras y números."
              required
            >
            <button class="icon-btn" type="button" aria-label="Mostrar contraseña" data-toggle="pass2">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </label>

        <div class="hint">
          Usa al menos 8 caracteres. Mezcla letras y números para mayor seguridad.
        </div>

        <button class="btn" type="submit">Guardar contraseña</button>

        <a class="btn btn-outline" href="index.html" style="text-align:center; display:block; text-decoration:none; padding:12px 14px;">
          Cancelar
        </a>
      </form>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
