<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mesas | Gestión Restaurante</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
  <div class="dash">
    <header class="dash-top">
      <div class="dash-title">
        <h1>Gestión de mesas</h1>
        <p>Crear, editar y eliminar mesas</p>
      </div>

      <div class="dash-actions">
        <a class="dash-btn" href="dashboard.html" style="text-decoration:none;">
          <i class="bi bi-arrow-left"></i>
          Volver
        </a>

        <button class="dash-btn" type="button" onclick="openModal()">
          <i class="bi bi-plus-circle"></i>
          Agregar mesa
        </button>
      </div>
    </header>

    <section class="panel">
      <div class="panel-head">
        <h2>Listado de mesas</h2>
        <span class="pill" id="totalMesas"><i class="bi bi-grid-3x3-gap"></i> Total: 0</span>
      </div>

      <div class="table-wrap">
        <table class="tbl">
          <thead>
            <tr>
              <th>Mesa</th>
              <th>Capacidad</th>
              <th>Fecha y Hora</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>

          <tbody id="tablaMesas">
          </tbody>
        </table>
      </div>
    </section>

    <!-- Modal -->
    <div class="modal" id="modalMesa" style="display:none;">
      <div class="modal-backdrop" onclick="closeModal()"></div>
      <div class="modal-card">
        <div class="modal-head">
          <h3 id="modalTitle">Agregar mesa</h3>
          <button class="modal-x" type="button" onclick="closeModal()">
            <i class="bi bi-x-lg"></i>
          </button>
        </div>

        <form id="formMesa">
          <input type="hidden" id="editId" value="">
          
          <label class="field">
            <span class="label">Nombre de mesa</span>
            <input class="input input-pad" type="text" id="nombreMesa" placeholder="Ej: Mesa 9" required>
          </label>

          <label class="field">
            <span class="label">Número de mesas</span>
            <input class="input input-pad" type="number" id="numeroMesas" min="1" placeholder="Ej: 2" value="1" required>
            <small style="color:#888; margin-top:4px; display:block;">Cantidad de mesas iguales a agregar</small>
          </label>

          <label class="field">
            <span class="label">Capacidad</span>
            <input class="input input-pad" type="number" id="capacidadMesa" min="1" placeholder="Ej: 4" required>
            <small style="color:#888; margin-top:4px; display:block;">Personas por mesa</small>
          </label>

          <label class="field">
            <span class="label">Fecha de disponibilidad</span>
            <input class="input input-pad" type="date" id="fechaMesa" required>
          </label>

          <label class="field">
            <span class="label">Hora de disponibilidad</span>
            <select class="input input-pad" id="horaMesa" required>
              <option value="">Seleccionar hora</option>
              <option>12:00 p.m.</option>
              <option>12:30 p.m.</option>
              <option>1:00 p.m.</option>
              <option>1:30 p.m.</option>
              <option>6:00 p.m.</option>
              <option>6:30 p.m.</option>
              <option>7:00 p.m.</option>
              <option>7:30 p.m.</option>
              <option>8:00 p.m.</option>
            </select>
          </label>

          <label class="field">
            <span class="label">Estado</span>
            <select class="input input-pad" id="estadoMesa" required>
              <option value="free">Libre</option>
              <option value="res">Reservada</option>
              <option value="occ">Ocupada</option>
            </select>
          </label>

          <div class="modal-actions">
            <button class="btn btn-outline" type="button" onclick="closeModal()">Cancelar</button>
            <button class="btn" type="submit">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    //  URL del backend
    const API_URL = 'http://localhost:3000/api';

    // 📅 Obtener fecha actual
    function getFechaHoy() {
      const hoy = new Date();
      return hoy.toISOString().split('T')[0];
    }

    // Renderizar estado
    function getEstadoHTML(estado) {
      const estados = {
        'LIBRE': '<span class="status s-free"><i class="bi bi-check-circle"></i> Libre</span>',
        'RESERVADA': '<span class="status s-res"><i class="bi bi-bookmark-check"></i> Reservada</span>',
        'OCUPADA': '<span class="status s-occ"><i class="bi bi-people-fill"></i> Ocupada</span>',
        'free': '<span class="status s-free"><i class="bi bi-check-circle"></i> Libre</span>',
        'res': '<span class="status s-res"><i class="bi bi-bookmark-check"></i> Reservada</span>',
        'occ': '<span class="status s-occ"><i class="bi bi-people-fill"></i> Ocupada</span>'
      };
      return estados[estado] || estados['LIBRE'];
    }

    //  Cargar mesas desde la API
    async function renderTable() {
      const tbody = document.getElementById('tablaMesas');
      const totalSpan = document.getElementById('totalMesas');
      
      if (!tbody) return;
      
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Cargando mesas...</td></tr>';
      
      try {
        const response = await fetch(`${API_URL}/mesas`);
        const mesas = await response.json();
        
        tbody.innerHTML = '';
        
        mesas.forEach(mesa => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${mesa.nombre_mesa}</td>
            <td>${mesa.capacidad} personas</td>
            <td>
              <small style="color:#888;">📅 ${mesa.fecha_disponibilidad}</small><br>
              <small style="color:#888;">🕐 ${mesa.hora_disponibilidad}</small>
            </td>
            <td>${getEstadoHTML(mesa.estado_mesa)}</td>
            <td class="actions">
              <button class="icon-action" type="button" title="Editar" onclick="editMesa(${mesa.id_mesa})">
                <i class="bi bi-pencil-square"></i>
              </button>
              <button class="icon-action danger" type="button" title="Eliminar" onclick="deleteMesa(${mesa.id_mesa})">
                <i class="bi bi-trash3"></i>
              </button>
              <button class="icon-action primary" type="button" title="Cambiar estado" onclick="toggleEstado(${mesa.id_mesa})">
                <i class="bi bi-arrow-repeat"></i>
              </button>
            </td>
          `;
          tbody.appendChild(row);
        });
        
        if (totalSpan) {
          totalSpan.innerHTML = `<i class="bi bi-grid-3x3-gap"></i> Total: ${mesas.length}`;
        }
        
      } catch (error) {
        console.error('Error cargando mesas:', error);
        tbody.innerHTML = '<tr><td colspan="5" style="color:red; text-align:center;">❌ Error al cargar mesas. Verifica que el servidor esté corriendo.</td></tr>';
      }
    }

    // Abrir modal para agregar/editar
    function openModal(id = null) {
      const modal = document.getElementById('modalMesa');
      const modalTitle = document.getElementById('modalTitle');
      const fechaInput = document.getElementById('fechaMesa');
      
      if (modal) {
        modal.style.display = 'block';
        
        if (id) {
          // Editar: cargar datos de la mesa
          cargarMesaParaEditar(id);
        } else {
          // Agregar: limpiar formulario
          document.getElementById('formMesa').reset();
          document.getElementById('editId').value = '';
          document.getElementById('modalTitle').textContent = 'Agregar mesa';
          document.getElementById('numeroMesas').value = '1';
        }
        
        // Fecha mínima = hoy
        if (fechaInput) {
          fechaInput.min = getFechaHoy();
        }
      }
    }

    //  Cargar datos de mesa para editar
    async function cargarMesaParaEditar(id) {
      try {
        const response = await fetch(`${API_URL}/mesas/${id}`);
        const mesa = await response.json();
        
        document.getElementById('editId').value = mesa.id_mesa;
        document.getElementById('nombreMesa').value = mesa.nombre_mesa;
        document.getElementById('numeroMesas').value = '1';
        document.getElementById('capacidadMesa').value = mesa.capacidad;
        document.getElementById('fechaMesa').value = mesa.fecha_disponibilidad;
        document.getElementById('horaMesa').value = mesa.hora_disponibilidad;
        document.getElementById('estadoMesa').value = mesa.estado_mesa;
        document.getElementById('modalTitle').textContent = 'Editar mesa';
        
      } catch (error) {
        console.error('Error cargando mesa:', error);
        alert('❌ Error al cargar los datos de la mesa');
      }
    }

    //  Cerrar modal
    function closeModal() {
      const modal = document.getElementById('modalMesa');
      if (modal) {
        modal.style.display = 'none';
      }
      document.getElementById('formMesa').reset();
      document.getElementById('editId').value = '';
      document.getElementById('modalTitle').textContent = 'Agregar mesa';
    }

    /// Guardar mesa (crear o editar)
    document.getElementById('formMesa').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const editId = document.getElementById('editId').value;
      const nombre = document.getElementById('nombreMesa').value.trim();
      const numeroMesas = parseInt(document.getElementById('numeroMesas').value) || 1;
      const capacidad = parseInt(document.getElementById('capacidadMesa').value);
      const fecha = document.getElementById('fechaMesa').value;
      const hora = document.getElementById('horaMesa').value;
      const estado = document.getElementById('estadoMesa').value;
      
      if (!nombre || !capacidad || !fecha || !hora) {
        alert(' Completa todos los campos obligatorios');
        return;
      }
      
      try {
        if (editId) {
          //  Editar existente
          const response = await fetch(`${API_URL}/mesas/${editId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              nombre_mesa: nombre,
              capacidad: capacidad,
              fecha_disponibilidad: fecha,
              hora_disponibilidad: hora,
              estado_mesa: estado
            })
          });
          
          const data = await response.json();
          if (data.success) {
            alert('✅ Mesa actualizada');
          }
          
        } else {
          //  Agregar nueva(s) mesa(s)
          for (let i = 0; i < numeroMesas; i++) {
            const nombreConNumero = numeroMesas > 1 ? `${nombre} ${i + 1}` : nombre;
            
            const response = await fetch(`${API_URL}/mesas`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                nombre_mesa: nombreConNumero,
                capacidad: capacidad,
                fecha_disponibilidad: fecha,
                hora_disponibilidad: hora,
                estado_mesa: estado
              })
            });
            
            const data = await response.json();
            if (!data.success) {
              alert(' Error al agregar mesa');
              return;
            }
          }
          
          alert(`✅ ${numeroMesas} mesa${numeroMesas > 1 ? 's' : ''} agregada${numeroMesas > 1 ? 's' : ''}`);
        }
        
        closeModal();
        await renderTable();
        
      } catch (error) {
        console.error('Error:', error);
        alert(' Error de conexión con el servidor');
      }
    });

    //  Eliminar mesa
    async function deleteMesa(id) {
      if (confirm('¿Estás seguro de eliminar esta mesa?')) {
        try {
          const response = await fetch(`${API_URL}/mesas/${id}`, {
            method: 'DELETE'
          });
          
          const data = await response.json();
          if (data.success) {
            alert('✅ Mesa eliminada');
            await renderTable();
          } else {
            alert(' Error al eliminar');
          }
        } catch (error) {
          console.error('Error:', error);
          alert(' Error de conexión con el servidor');
        }
      }
    }

    //  Cambiar estado de mesa
    async function toggleEstado(id) {
      try {
        // Obtener datos actuales de la mesa
        const response = await fetch(`${API_URL}/mesas/${id}`);
        const mesa = await response.json();
        
        // Ciclar estados: LIBRE → RESERVADA → OCUPADA → LIBRE
        const estados = ['LIBRE', 'RESERVADA', 'OCUPADA'];
        const actual = estados.indexOf(mesa.estado_mesa);
        const nuevoEstado = estados[(actual + 1) % estados.length];
        
        // Actualizar en backend
        const updateResponse = await fetch(`${API_URL}/mesas/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            nombre_mesa: mesa.nombre_mesa,
            capacidad: mesa.capacidad,
            fecha_disponibilidad: mesa.fecha_disponibilidad,
            hora_disponibilidad: mesa.hora_disponibilidad,
            estado_mesa: nuevoEstado
          })
        });
        
        const data = await updateResponse.json();
        if (data.success) {
          const nombres = { 'LIBRE': 'Libre', 'RESERVADA': 'Reservada', 'OCUPADA': 'Ocupada' };
          alert(`✅ Estado cambiado a: ${nombres[nuevoEstado]}`);
          await renderTable();
        }
        
      } catch (error) {
        console.error('Error:', error);
        alert(' Error de conexión con el servidor');
      }
    }

    //  Editar mesa (abre modal con datos)
    async function editMesa(id) {
      openModal(id);
    }

    //  Inicializar
    document.addEventListener('DOMContentLoaded', function() {
      renderTable();
      
      // Cerrar modal al hacer clic fuera
      document.getElementById('modalMesa')?.addEventListener('click', function(e) {
        if (e.target === this) closeModal();
      });
      
      // Cerrar con tecla Escape
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeModal();
      });
    });
  </script>
</body>
</html>
