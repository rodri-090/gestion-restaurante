<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enlace enviado</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
  <main class="page">
    <section class="card">
      <div class="brand">
        <p class="subtitle">Revisa tu correo</p>
      </div>

      <div class="notice">
        <div class="notice-icon">
          <i class="bi bi-envelope-check"></i>
        </div>

        <div class="notice-text">
          <p class="notice-title">Te enviamos un enlace de recuperación</p>
          <p class="notice-desc">
            Si el correo o usuario existe, recibirás un mensaje con los pasos para recuperar el acceso.
            Revisa tu bandeja de entrada y también spam.
          </p>
        </div>
      </div>

      <a class="btn" href="index.html" style="text-align:center; display:block; text-decoration:none;">
        Volver al login
      </a>

      <a class="btn btn-outline" href="recuperacion.html" style="text-align:center; display:block; text-decoration:none; padding:12px 14px; margin-top:10px;">
        Intentar de nuevo
      </a>
    </section>
  </main>
</body>
</html>
