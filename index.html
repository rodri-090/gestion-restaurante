<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Gestión Restaurante</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
  <main class="page">
    <section class="card">
      <div class="brand">
        <p class="subtitle">Inicia sesión para continuar</p>
      </div>

      <form class="form" action="#" method="post">
        <label class="field">
          <span class="label">Usuario</span>
          <div class="input-wrap">
            <i class="bi bi-person input-icon"></i>
            <input class="input input-pad" type="text" name="usuario" id="usuarioInput" placeholder="Correo o usuario" autocomplete="username" required>
          </div>
        </label>

        <label class="field">
          <span class="label">Contraseña</span>
          <div class="input-wrap">
            <i class="bi bi-lock input-icon"></i>
            <input class="input input-pad" type="password" name="password" id="loginPass" placeholder="••••••••" autocomplete="current-password" required>
            <button class="icon-btn" type="button" id="togglePassword" aria-label="Mostrar contraseña">
              <i class="bi bi-eye" id="eyeIcon"></i>
            </button>
          </div>
        </label>

        <div class="row">
          <label class="check">
            <input type="checkbox" name="recordarme">
            <span>Recordarme</span>
          </label>
          <a class="link" href="recuperacion.html">Olvidé mi contraseña</a>
        </div>

        <button class="btn" type="button" id="btnLogin">Entrar</button>
        <p class="subtitle" style="margin-top:12px; font-size:0.85rem; color:#6b7280;">
          El inicio de sesión usa la tabla <strong>usuarios</strong> en MySQL (correo y contraseña).
        </p>
      </form>
    </section>
  </main>

  <script src="js/app.js"></script>

  <script>
    const API_LOGIN = '/api/login';

    function nombreMostrar(usuario) {
      const c = (usuario.correo || '').split('@')[0];
      return c || usuario.correo || 'Usuario';
    }

    //  Mostrar/Ocultar contraseña
    document.getElementById('togglePassword').addEventListener('click', function() {
      const passwordInput = document.getElementById('loginPass');
      const eyeIcon = document.getElementById('eyeIcon');
      
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        eyeIcon.classList.remove('bi-eye');
        eyeIcon.classList.add('bi-eye-slash');
      } else {
        passwordInput.type = 'password';
        eyeIcon.classList.remove('bi-eye-slash');
        eyeIcon.classList.add('bi-eye');
      }
    });

    document.addEventListener('DOMContentLoaded', function() {
      const btnLogin = document.getElementById('btnLogin');
      if (btnLogin) {
        btnLogin.addEventListener('click', async function(e) {
          e.preventDefault();

          const correo = document.getElementById('usuarioInput').value.trim();
          const password = document.getElementById('loginPass').value;

          if (!correo || !password) {
            alert('Ingresa correo y contraseña.');
            return;
          }

          try {
            const res = await fetch(API_LOGIN, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ correo, password })
            });

            const data = await res.json().catch(() => ({}));

            if (!res.ok || !data.success || !data.usuario) {
              alert(data.mensaje || 'Credenciales incorrectas o usuario inactivo.');
              return;
            }

            const u = data.usuario;
            const esAdmin = (u.nombre_rol || '') === 'Administrador';

            sessionStorage.removeItem('isLoggedIn');
            sessionStorage.removeItem('isAdmin');
            sessionStorage.removeItem('userEmail');
            sessionStorage.removeItem('userName');
            sessionStorage.removeItem('adminEmail');

            if (esAdmin) {
              sessionStorage.setItem('isAdmin', 'true');
              sessionStorage.setItem('adminEmail', u.correo);
              sessionStorage.setItem('userName', nombreMostrar(u));
            } else {
              sessionStorage.setItem('isLoggedIn', 'true');
              sessionStorage.setItem('userEmail', u.correo);
              sessionStorage.setItem('userName', nombreMostrar(u));
            }

            alert('Bienvenido, ' + nombreMostrar(u));
            window.location.href = 'dashboard.html';
          } catch (err) {
            console.error(err);
            alert('No se pudo conectar con el servidor. ¿Está corriendo npm start y la base de datos?');
          }
        });
      }
    });
  </script>
</body>
</html>
