<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Gestión Restaurante</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <main class="page">
  <section class="card">
    <div class="brand">
    <p class="subtitle">Inicia sesión para continuar</p>
    </div>
    </div>

    <form class="form" action="#" method="post">
      <label class="field">
  <span class="label">Usuario</span>
  <div class="input-wrap">
    <i class="bi bi-person input-icon"></i>
    <input class="input input-pad" type="text" name="usuario" placeholder="Correo o usuario" autocomplete="username" required>
  </div>
</label>

<label class="field">
  <span class="label">Contraseña</span>
  <div class="input-wrap">
    <i class="bi bi-lock input-icon"></i>
    <input class="input input-pad" type="password" name="password" id="loginPass" placeholder="••••••••" autocomplete="current-password" required>
    <button class="icon-btn" type="button" aria-label="Mostrar contraseña" data-toggle="loginPass">
      <i class="bi bi-eye"></i>
    </button>
  </div>
</label>

      <div class="row">
        <label class="check">
          <input type="checkbox" name="recordarme">
          <span>Recordarme</span>
        </label>

        <a class="link" href="recuperacion.html">Olvidé mi contraseña</a>
      </div>

      <button class="btn" type="button">Entrar</button>

      <div class="divider"></div>

      <a class="btn btn-outline" href="dashboard.html" style="text-decoration:none; display:block; text-align:center;">
      Entrar como administrador
      </a>
    </form>
  </section>
</main>
  <script src="js/app.js"></script>
</body>
</html>
