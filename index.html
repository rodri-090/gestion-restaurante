<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Gestión Restaurante</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
  <main class="page">
    <section class="card">
      <div class="brand">
        <p class="subtitle">Inicia sesión para continuar</p>
      </div>

      <form class="form" action="#" method="post">
        <label class="field">
          <span class="label">Usuario</span>
          <div class="input-wrap">
            <i class="bi bi-person input-icon"></i>
            <input class="input input-pad" type="text" name="usuario" id="usuarioInput" placeholder="Correo o usuario" autocomplete="username" required>
          </div>
        </label>

        <label class="field">
          <span class="label">Contraseña</span>
          <div class="input-wrap">
            <i class="bi bi-lock input-icon"></i>
            <input class="input input-pad" type="password" name="password" id="loginPass" placeholder="••••••••" autocomplete="current-password" required>
            <button class="icon-btn" type="button" id="togglePassword" aria-label="Mostrar contraseña">
              <i class="bi bi-eye" id="eyeIcon"></i>
            </button>
          </div>
        </label>

        <div class="row">
          <label class="check">
            <input type="checkbox" name="recordarme">
            <span>Recordarme</span>
          </label>
          <a class="link" href="recuperacion.html">Olvidé mi contraseña</a>
        </div>

        <button class="btn" type="button" id="btnLogin">Entrar</button>

        <div class="divider"></div>

        <button type="button" class="btn btn-outline" id="btnAdmin">
          Entrar como administrador
        </button>
      </form>
    </section>
  </main>

  <script src="js/app.js"></script>

  <script>
    // 🔐 Credenciales de administrador
    const ADMIN_EMAIL = "administrador@restaurante.com";
    const ADMIN_PASSWORD = "Admin2026!";
    
    // 👥 Múltiples usuarios permitidos
    const USUARIOS_PERMITIDOS = [
      { correo: "usuario@restaurante.com", password: "Usuario2026!", nombre: "Usuario General" },
      { correo: "juan@restaurante.com", password: "Juan123!", nombre: "Juan Pérez" },
      { correo: "maria@restaurante.com", password: "Maria456!", nombre: "María García" },
      { correo: "carlos@restaurante.com", password: "Carlos789!", nombre: "Carlos López" }
      // Puedes agregar más usuarios aquí
    ];

    // 👁️ Mostrar/Ocultar contraseña
    document.getElementById('togglePassword').addEventListener('click', function() {
      const passwordInput = document.getElementById('loginPass');
      const eyeIcon = document.getElementById('eyeIcon');
      
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        eyeIcon.classList.remove('bi-eye');
        eyeIcon.classList.add('bi-eye-slash');
      } else {
        passwordInput.type = 'password';
        eyeIcon.classList.remove('bi-eye-slash');
        eyeIcon.classList.add('bi-eye');
      }
    });

    document.addEventListener('DOMContentLoaded', function() {
      
      // Botón "Entrar" (naranja) - Usuario normal
      const btnLogin = document.getElementById('btnLogin');
      if (btnLogin) {
        btnLogin.addEventListener('click', function(e) {
          e.preventDefault();
          
          const usuarioInput = document.getElementById('usuarioInput').value.trim();
          const passwordInput = document.getElementById('loginPass').value;
          
          // Buscar usuario en la lista
          const usuarioEncontrado = USUARIOS_PERMITIDOS.find(u => 
            u.correo === usuarioInput && u.password === passwordInput
          );
          
          if (usuarioEncontrado) {
            // ✅ Login correcto
            sessionStorage.setItem('isLoggedIn', 'true');
            sessionStorage.setItem('userEmail', usuarioEncontrado.correo);
            sessionStorage.setItem('userName', usuarioEncontrado.nombre);
            alert("✅ Bienvenido, " + usuarioEncontrado.nombre);
            window.location.href = 'dashboard.html';
          } else {
            // ❌ Credenciales incorrectas
            let mensaje = "❌ Usuario o contraseña incorrectos\n\n";
            mensaje += "Usuarios disponibles:\n";
            USUARIOS_PERMITIDOS.forEach(u => {
              mensaje += `\n📧 ${u.correo}\n🔑 ${u.password}\n👤 ${u.nombre}\n`;
            });
            alert(mensaje);
          }
        });
      }
      
      // Botón "Entrar como administrador"
      const btnAdmin = document.getElementById('btnAdmin');
      if (btnAdmin) {
        btnAdmin.addEventListener('click', function(e) {
          e.preventDefault();
          
          // Paso 1: Pedir correo
          const emailInput = prompt("🔐 Acceso de Administrador\n\nIngresa tu correo:");
          if (!emailInput) return;
          
          // Validar correo
          if (emailInput.trim().toLowerCase() !== ADMIN_EMAIL.toLowerCase()) {
            alert("⚠️ Correo no autorizado\n\nSolo se permite: " + ADMIN_EMAIL);
            return;
          }
          
          // Paso 2: Pedir contraseña
          const passwordInput = prompt("🔐 Ingresa tu contraseña:");
          if (!passwordInput) return;
          
          // Validar contraseña
          if (passwordInput !== ADMIN_PASSWORD) {
            alert("❌ Contraseña incorrecta");
            return;
          }
          
          // ✅ Acceso concedido
          sessionStorage.setItem('isAdmin', 'true');
          sessionStorage.setItem('adminEmail', emailInput);
          alert("✅ Bienvenido, Administrador");
          window.location.href = 'dashboard.html';
        });
      }
    });
  </script>
</body>
</html>
